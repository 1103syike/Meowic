<div class="main-layout">
  <!-- Top: 標題與用戶資訊 -->
  <app-header class="header-area"></app-header>

  <!-- Left: 導覽與音樂庫 (Sidebar) -->
  <aside class="sidebar-area">
    <app-toolbar></app-toolbar>
    <app-musicbar></app-musicbar>
  </aside>

  <!-- Right: 內容顯示區 -->
  <main class="content-area">
    <router-outlet />
  </main>
  @if (!this.player.getIsClose()) {
    <app-player class="player-area"></app-player>
  }
</div>
