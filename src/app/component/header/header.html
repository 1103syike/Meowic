<header class="header">
  <div class="header__logo" routerLink="/" (click)="searchState.closeSearch()">Meowic</div>
  <button class="header__patch">
    <div>BETA</div>
  </button>

  <nav class="header__nav">
    <button class="header__nav__btn" routerLink="/songs" (click)="searchState.closeSearch()">所有歌曲</button>
    <button class="header__nav__btn" (click)="openProDialog()">Meowic Pro</button>
    <a
      class="header__nav__btn"
      routerLink="/cms"
      target="_blank"
      rel="noopener"
      (click)="searchState.closeSearch()"
    >
      CMS
    </a>
  </nav>

  <div class="user">
    @if (!!auth.currentUserStatus()) {
      <div class="user__profile">
        <span class="user__name">{{ this.auth.user()?.name }}</span>
        @if (selectedProPlan()) {
          <span class="user__badge">{{ selectedProPlan() }}</span>
        }
      </div>
      <button class="user__login" (click)="logout()">登出</button>
    } @else {
      <button class="user__login" (click)="openLoginDialog()">登入</button>
    }
  </div>
</header>

@if (this.isLoginDialogOpen()) {
  <app-login (close)="isLoginDialogOpen.set(false)"></app-login>
}

@if (this.isProDialogOpen()) {
  <app-pro-dialog
    (close)="isProDialogOpen.set(false)"
    (selected)="selectProPlan($event)"
  ></app-pro-dialog>
}
